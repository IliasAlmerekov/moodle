  <body>
    <script>
      // The custom cursor is mounted by useCursor. Until it boots we
      // don't change the system cursor; once the hook is live it adds
      // .has-cursor to <html>, which hides the system arrow. On touch
      // / reduced-motion devices the hook never mounts, so the body
      // keeps its native cursor. Run inline so the class lands before
      // first paint and we never get a "cursor flicker" frame.
      (function () {
        try {
          var rm = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches
          var touch = navigator.maxTouchPoints > 0
          if (!rm && !touch) document.documentElement.classList.add('has-cursor')
        } catch (e) { /* no-op */ }
      })()
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
