# SELF-CONTAINED DEMO STACK — bundles its OWN Moodle + MariaDB.
#
# Use this file for demos / local evaluation, where there is no pre-existing
# Moodle. nginx fronts the bundled Moodle at "/" and the chatbot at /api,
# /chatbot, /health on the same domain.
#
# For deployment BESIDE an existing school Moodle, use docker-compose.prod.yml
# instead — it omits Moodle/MariaDB and points the proxy at the real Moodle.
# Do NOT run both against the same domain.
#
# Docker image versions pinned 2026-06-01
# Reason: reproducible builds, avoid breaking changes from unpinned latest tags
# See DECISIONS.md "Pin Docker images" for upgrade policy
# SSL: run compose/setup-ssl.sh once before first `docker compose up`
name: moodle-stack
services:
  mariadb:
    image: bitnamilegacy/mariadb:11.8.2-debian-12-r5
    restart: unless-stopped
    environment:
      - ALLOW_EMPTY_PASSWORD=no
      - MARIADB_USER=${MARIADB_USER}
      - MARIADB_PASSWORD=${MARIADB_PASSWORD}
      - MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD}
      - MARIADB_DATABASE=${MARIADB_DATABASE}
      - MARIADB_CHARACTER_SET=utf8mb4
      - MARIADB_COLLATE=utf8mb4_unicode_ci
    volumes:
      - ../data/mariadb:/bitnami/mariadb
    networks: [moodle_net]
    # Resource limits (DEP-02): cap every service so an Ollama memory spike
    # cannot OOM the host and take down the database / Moodle.
    mem_limit: 1g
    cpus: "1.0"
    # Readiness gate (DEP-03): Moodle must not boot before the DB accepts
    # connections. $$ defers expansion to the container shell so the password is
    # read from the container's own env, not baked into the compose-parsed command.
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -uroot -p\"$$MARIADB_ROOT_PASSWORD\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  moodle:
    build:
      context: .
      dockerfile: Dockerfile.moodle
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    ports:
      - "127.0.0.1:${MOODLE_HTTP_PORT}:8080"
    volumes:
      - ../data/moodle:/bitnami/moodle
      - ../moodle-plugins/local/aichatbot:/bitnami/moodle/local/aichatbot:ro
      - ../data/moodledata:/bitnami/moodledata
    networks: [moodle_net]
    mem_limit: 1g
    cpus: "2.0"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/login/index.php >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s

  ollama:
    image: ollama/ollama:0.12.0
    restart: unless-stopped
    volumes:
      - ../data/ollama:/root/.ollama
    networks: [moodle_net]
    # Memory-hungry service — size mem_limit to the chosen model. llama3.2:3b
    # fits in ~6g; raise for larger models or the host OOM killer may strike.
    mem_limit: 8g
    mem_reservation: 4g
    cpus: "4.0"
    healthcheck:
      # `ollama list` talks to the local server; a 0 exit means it is ready.
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  ollama-init:
    image: ollama/ollama:0.12.0
    depends_on:
      ollama:
        condition: service_healthy
    # Wait for the server to answer before pulling, instead of a fixed sleep — a
    # cold start can take well over 5s and would otherwise race the pull.
    entrypoint:
      - /bin/sh
      - -c
      - 'until ollama list >/dev/null 2>&1; do echo "waiting for ollama..."; sleep 2; done; ollama pull ${OLLAMA_MODEL} || { echo "ERROR: failed to pull ${OLLAMA_MODEL}"; exit 1; }; ollama list | grep -qF "${OLLAMA_MODEL}" || { echo "ERROR: ${OLLAMA_MODEL} not present after pull"; exit 1; }; echo "model ${OLLAMA_MODEL} ready"'
    environment:
      - OLLAMA_HOST=ollama:11434
    networks: [moodle_net]
    mem_limit: 512m
    cpus: "1.0"
    restart: "no"

  proxy:
    build:
      context: ../proxy
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - MOODLE_URL=http://moodle:8080
      - MOODLE_TOKEN=${MOODLE_TOKEN}
      - OLLAMA_URL=${OLLAMA_URL}
      - OLLAMA_MODEL=${OLLAMA_MODEL}
      - OLLAMA_CONCURRENCY=${OLLAMA_CONCURRENCY:-2}
      - OLLAMA_MAX_QUEUE=${OLLAMA_MAX_QUEUE:-20}
      - OLLAMA_TIMEOUT_MS=${OLLAMA_TIMEOUT_MS:-120000}
      - CHAT_DB_PATH=/data/chat.db
      # Encrypts chat message content at rest (PR-01). REQUIRED in production —
      # env.js fails fast on startup if empty.
      - CHAT_ENCRYPTION_KEY=${CHAT_ENCRYPTION_KEY}
      - PUBLIC_MOODLE_URL=${PUBLIC_MOODLE_URL}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - TRUST_PROXY=${TRUST_PROXY:-1}
      # Identity verification — REQUIRED in production. env.js fails fast on
      # startup if this is empty, so it must be forwarded into the container.
      - CHATBOT_AUTH_SECRET=${CHATBOT_AUTH_SECRET}
      - AUTH_TOKEN_TTL_MS=${AUTH_TOKEN_TTL_MS:-7200000}
      # Operational tuning — forwarded so .env edits actually reach the runtime
      # instead of silently falling back to the defaults baked into env.js.
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - RATE_LIMIT_MAX=${RATE_LIMIT_MAX:-20}
      - RATE_LIMIT_WINDOW=${RATE_LIMIT_WINDOW:-1 minute}
      - USER_RATE_LIMIT_MAX=${USER_RATE_LIMIT_MAX:-10}
      - USER_RATE_LIMIT_WINDOW_MS=${USER_RATE_LIMIT_WINDOW_MS:-60000}
      - CHAT_RETENTION_DAYS=${CHAT_RETENTION_DAYS:-90}
      - MAX_MESSAGE_LENGTH=${MAX_MESSAGE_LENGTH:-500}
      - MAX_HISTORY_MESSAGES=${MAX_HISTORY_MESSAGES:-12}
      - CACHE_TTL_COURSES=${CACHE_TTL_COURSES:-300000}
      - CACHE_TTL_USERS=${CACHE_TTL_USERS:-60000}
    volumes:
      - ../data:/data
    networks: [moodle_net]
    depends_on:
      moodle:
        condition: service_started
      ollama:
        condition: service_healthy
    mem_limit: 512m
    mem_reservation: 256m
    cpus: "1.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # nginx 1.27.4 pinned 2026-05-29
  nginx:
    image: nginx:1.27.4
    restart: unless-stopped
    # envsubst replaces ${NGINX_DOMAIN} in the template; $host etc. are nginx vars, not shell vars.
    # $$NGINX_DOMAIN: $$ is a Compose escape for a literal $, so the container receives '$NGINX_DOMAIN'
    # as the variable-names argument to envsubst (not the resolved value).
    entrypoint: ["/bin/sh", "-c", "envsubst '$$NGINX_DOMAIN' < /tmp/nginx.conf.template > /etc/nginx/nginx.conf && exec nginx -g 'daemon off;'"]
    environment:
      - NGINX_DOMAIN=${NGINX_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf.template:/tmp/nginx.conf.template:ro
      - ../data/certbot:/etc/letsencrypt:ro
      - ../data/certbot-webroot:/var/www/certbot:ro
    networks: [moodle_net]
    mem_limit: 128m
    cpus: "0.5"
    # Don't route until both upstreams are actually ready (DEP-03), avoiding 502s
    # right after `docker compose up`.
    depends_on:
      proxy:
        condition: service_healthy
      moodle:
        condition: service_healthy

networks:
  moodle_net:
    driver: bridge
