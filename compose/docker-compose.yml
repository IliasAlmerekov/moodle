# Docker image versions pinned 2026-05-29
# Reason: reproducible builds, avoid breaking changes from unpinned latest tags
# See DECISIONS.md "Pin Docker images" for upgrade policy
name: moodle-stack
services:
  mariadb:
    image: bitnami/mariadb:11.8.1
    restart: unless-stopped
    environment:
      - ALLOW_EMPTY_PASSWORD=no
      - MARIADB_USER=${MARIADB_USER}
      - MARIADB_PASSWORD=${MARIADB_PASSWORD}
      - MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD}
      - MARIADB_DATABASE=${MARIADB_DATABASE}
      - MARIADB_CHARACTER_SET=utf8mb4
      - MARIADB_COLLATE=utf8mb4_unicode_ci
    volumes:
      - ../data/mariadb:/bitnami/mariadb
    networks: [moodle_net]

  moodle:
    build:
      context: .
      dockerfile: Dockerfile.moodle
    restart: unless-stopped
    depends_on: [mariadb]
    ports:
      - "${MOODLE_HTTP_PORT}:8080"
    volumes:
      - ../data/moodle:/bitnami/moodle
      - ../data/moodledata:/bitnami/moodledata
    networks: [moodle_net]

  ollama:
    image: ollama/ollama:0.5.13
    restart: unless-stopped
    volumes:
      - ../data/ollama:/root/.ollama
    networks: [moodle_net]

  ollama-init:
    image: ollama/ollama:0.5.13
    depends_on: [ollama]
    entrypoint: ["/bin/sh", "-c", "sleep 5 && ollama pull ${OLLAMA_MODEL}"]
    environment:
      - OLLAMA_HOST=ollama:11434
    networks: [moodle_net]
    restart: "no"

  proxy:
    build:
      context: ../proxy
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - MOODLE_URL=http://localhost:8080
      - MOODLE_TOKEN=${MOODLE_TOKEN}
      - OLLAMA_URL=${OLLAMA_URL}
      - OLLAMA_MODEL=${OLLAMA_MODEL}
    network_mode: host
    depends_on: [moodle]

networks:
  moodle_net:
    driver: bridge
