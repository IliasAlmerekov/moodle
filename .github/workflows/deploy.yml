name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

# Least privilege: deploy only needs to read the repository to check out code.
permissions:
  contents: read

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to production
        run: ./deploy.sh

      - name: Health check
        run: |
          echo "Running health check (10 attempts, 5s interval)..."
          for i in $(seq 1 10); do
            if curl -sf --max-time 3 http://localhost:3000/health > /dev/null; then
              echo "✓ Proxy is healthy (attempt $i/10)"
              exit 0
            fi
            echo "  Attempt $i/10 failed, retrying in 5s..."
            [ $i -lt 10 ] && sleep 5
          done
          echo "✗ Health check failed after 10 attempts"
          exit 1

      - name: Show proxy logs on failure
        if: failure()
        working-directory: compose
        run: docker compose logs proxy --tail=50
