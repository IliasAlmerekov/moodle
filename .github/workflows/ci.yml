name: CI

on:
  push:
    branches: [main, refactoring]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: proxy

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: proxy/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: proxy/coverage/lcov.info
          fail_ci_if_error: false

  security:
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: proxy

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: proxy/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: |
          npm audit --json --omit=dev > /tmp/audit.json || true
          node -e "
            const audit = JSON.parse(require('fs').readFileSync('/tmp/audit.json', 'utf8'));
            const vulns = audit.vulnerabilities || {};
            const highs = Object.values(vulns).filter(v => v.severity === 'high');
            const nonFastify = highs.filter(v => v.name !== 'fastify');
            if (nonFastify.length > 0) {
              console.error('High severity vulnerabilities found (excluding known Fastify 4.x issues):');
              nonFastify.forEach(v => console.error('  -', v.name, v.via.map(x => x.title || x).join(', ')));
              process.exit(1);
            }
            if (highs.length > 0) {
              console.log('Ignoring known Fastify 4.x high-severity advisories (upgrade deferred to dedicated milestone). See DECISIONS.md.');
            }
            console.log('npm audit passed.');
          "

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
