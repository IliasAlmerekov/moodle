<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <link rel="stylesheet" href="chatbot.css" />
  </head>
  <body>
    <button
      type="button"
      id="chatbot-toogle"
      class="chatbot-toogle"
      aria-label="AI Assistent öffnen"
      aria-haspopup="dialog"
      aria-expanded="false"
    >
      <img
        src="assets/chat_icon.png"
        alt=""
        class="chatbot-toggle-icon"
        aria-hidden="true"
      />
    </button>

    <div
      id="chatbot-window"
      class="chatbot-window hidden"
      role="dialog"
      aria-label="AI Assistent"
    >
      <div class="chatbot-header">
        <img src="assets/moodle_logo.svg" alt="AI Logo" class="chatbot-logo" />
        <h2 class="chatbot-title">AI Assistent</h2>
        <div class="button-section">
          <button
            type="button"
            id="chatbot-new-chat"
            class="chatbot-new-chat"
            aria-label="Neuer Chat"
            title="Neuer Chat"
          >
            <img src="assets/write.png" alt="pencil" class="new-chat" />
          </button>
          <button
            type="button"
            id="chatbot-close"
            class="chatbot-close"
            aria-label="Schließen"
          >
            ✖
          </button>
        </div>
      </div>

      <div
        id="chatbot-messages"
        class="chatbot-messages"
        role="log"
        aria-live="polite"
        aria-atomic="false"
      >
        <div class="message bot-message">
          <div class="message-content">
            Hallo! Ich bin dein AI-Assistent. Wie kann ich dir helfen?
          </div>
        </div>
      </div>

      <div class="chatbot-input-area">
        <input
          type="text"
          id="chatbot-input"
          class="chatbot-input"
          placeholder="Nachricht eingeben..."
          aria-label="Nachricht eingeben"
          autocomplete="off"
        />
        <button type="button" id="chatbot-send" class="chatbot-send">Senden</button>
      </div>
    </div>
    <script type="module" src="chatbot.js?v=20260602"></script>
  </body>
</html>
