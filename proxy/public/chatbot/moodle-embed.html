<!-- AI Chatbot for Moodle -->

<!-- Chatbot Styles -->
<link rel="stylesheet" href="/chatbot/chatbot.css" />

<!--
  Configuration contract:
  Moodle must set window.CHATBOT_CONFIG before this snippet loads.
  Expected shape:
    window.CHATBOT_CONFIG = {
      userId: <number>,   // Moodle user id
      ts:     <number>,   // unix epoch ms when the token was signed
      sig:    <string>,   // HMAC-SHA256(secret, `${userId}.${ts}`) as lowercase hex
      apiUrl: <string>,   // optional — proxy origin (defaults to window.location.origin)
    };

  SECURITY: the proxy never trusts a raw userId. It recomputes the signature
  with the shared secret (CHATBOT_AUTH_SECRET) and rejects unsigned/tampered/
  expired tokens with HTTP 401. The signature MUST be produced server-side in
  Moodle (where $USER->id is authenticated) — never in client JavaScript.

  Example Moodle-side PHP (e.g. in a custom block or additional HTML, using the
  SAME secret as the proxy's CHATBOT_AUTH_SECRET):

    <?php
    $secret = get_config('local_aichatbot', 'authsecret'); // your stored secret
    $userid = (int) $USER->id;
    $ts     = round(microtime(true) * 1000);               // epoch ms
    $sig    = hash_hmac('sha256', $userid . '.' . $ts, $secret);
    ?>
    <script>
      window.CHATBOT_CONFIG = {
        userId: <?php echo $userid; ?>,
        ts:     <?php echo $ts; ?>,
        sig:    "<?php echo $sig; ?>",
      };
    </script>
-->

<!-- Chatbot HTML Structure -->
<button
  type="button"
  id="chatbot-toogle"
  class="chatbot-toogle"
  aria-label="AI Assistent öffnen"
  aria-haspopup="dialog"
  aria-expanded="false"
>
  💬
</button>

<div
  id="chatbot-window"
  class="chatbot-window hidden"
  role="dialog"
  aria-label="AI Assistent"
>
  <div class="chatbot-header">
    <img
      src="/chatbot/assets/moodle_logo.svg"
      alt="AI Logo"
      class="chatbot-logo"
    />
    <div class="button-section">
      <button
        type="button"
        id="chatbot-new-chat"
        class="chatbot-new-chat"
        aria-label="New Chat"
      >
        <img
          src="/chatbot/assets/write.png"
          alt="pencil"
          class="new-chat"
        />
      </button>
      <button
        type="button"
        id="chatbot-close"
        class="chatbot-close"
        aria-label="Schließen"
      >
        ✖
      </button>
    </div>
  </div>

  <div
    id="chatbot-messages"
    class="chatbot-messages"
    role="log"
    aria-live="polite"
    aria-atomic="false"
  >
    <div class="message bot-message">
      <div class="message-content">
        Hallo! Ich bin dein AI-Assistent. Wie kann ich dir helfen?
      </div>
    </div>
  </div>

  <div class="chatbot-input-area">
    <input
      type="text"
      id="chatbot-input"
      class="chatbot-input"
      placeholder="Nachricht eingeben..."
      aria-label="Nachricht eingeben"
      autocomplete="off"
    />
    <button type="button" id="chatbot-send" class="chatbot-send">Senden</button>
  </div>
</div>

<!-- Chatbot JavaScript -->
<script
  type="module"
  src="/chatbot/chatbot.js?v=20260602"
></script>
