<!-- AI Chatbot for Moodle -->

<!-- Chatbot Styles -->
<link rel="stylesheet" href="/chatbot/chatbot.css" />

<!--
  Configuration contract:
  Moodle must set window.CHATBOT_CONFIG before this snippet loads.
  Expected shape:
    window.CHATBOT_CONFIG = {
      userId: <number>,   // Moodle user id
      apiUrl: <string>,   // optional — proxy origin (defaults to window.location.origin)
    };
-->

<!-- Chatbot HTML Structure -->
<button
  type="button"
  id="chatbot-toogle"
  class="chatbot-toogle"
  aria-label="AI Assistent öffnen"
>
  💬
</button>

<div id="chatbot-window" class="chatbot-window hidden">
  <div class="chatbot-header">
    <img
      src="/chatbot/assets/moodle_logo.svg"
      alt="AI Logo"
      class="chatbot-logo"
    />
    <div class="button-section">
      <button
        type="button"
        id="chatbot-new-chat"
        class="chatbot-new-chat"
        aria-label="New Chat"
      >
        <img
          src="/chatbot/assets/write.png"
          alt="pencil"
          class="new-chat"
        />
      </button>
      <button
        type="button"
        id="chatbot-close"
        class="chatbot-close"
        aria-label="Schließen"
      >
        ✖
      </button>
    </div>
  </div>

  <div id="chatbot-messages" class="chatbot-messages">
    <div class="message bot-message">
      <div class="message-content">
        Hallo! Ich bin dein AI-Assistent. Wie kann ich dir helfen?
      </div>
    </div>
  </div>

  <div class="chatbot-input-area">
    <input
      type="text"
      id="chatbot-input"
      class="chatbot-input"
      placeholder="Nachricht eingeben..."
      autocomplete="off"
    />
    <button type="button" id="chatbot-send" class="chatbot-send">Senden</button>
  </div>
</div>

<!-- Chatbot JavaScript -->
<script
  type="module"
  src="/chatbot/chatbot.js?v=20260601"
></script>
